services:
  mysql:
    image: mysql:8.4
    container_name: student_dropout_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: student_dropout
      MYSQL_USER: student_app
      MYSQL_PASSWORD: student_app_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
